name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: analyzer
          POSTGRES_PASSWORD: analyzer
          POSTGRES_DB: analyzer
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U analyzer -d analyzer"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      APP_ENV: test
      APP_BASE_URL: http://localhost:8000
      LOG_LEVEL: INFO
      API_KEY: test-admin-key
      SHARE_TOKEN_SECRET: test-share-secret-1234567890
      ACCESS_TOKEN_SECRET: test-access-secret-1234567890
      REFRESH_TOKEN_SECRET: test-refresh-secret-1234567890
      OAUTH_TOKEN_ENC_KEY: test-encryption-secret-1234567890
      DATABASE_URL: postgresql+asyncpg://analyzer:analyzer@localhost:5432/analyzer
      REDIS_URL: redis://localhost:6379/0
      USE_REDIS_QUEUE: "true"
      RUN_WORKER_IN_API: "false"
      RATE_LIMIT_PER_MINUTE: "1000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync dependencies
        run: uv sync

      - name: Alembic upgrade head
        run: uv run alembic upgrade head

      - name: Alembic no-op check
        run: uv run alembic check

      - name: Backend tests
        run: uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_BASE: http://localhost:8000
        run: npm run build

      - name: Frontend tests
        run: npm test
